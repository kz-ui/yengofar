<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#091B34"/>

  <!-- Decorative soft circles -->
  <circle cx="1080" cy="80" r="240" fill="#0D2543"/>
  <circle cx="160" cy="560" r="180" fill="#0D2543"/>
  <circle cx="700" cy="315" r="400" fill="#0D2543" opacity="0.3"/>

  <!-- Kiwi accent left bar -->
  <rect x="0" y="0" width="7" height="630" fill="#00A991"/>

  <!-- Kiwi accent bottom strip -->
  <rect x="0" y="580" width="1200" height="50" fill="#00A991" opacity="0.12"/>

  <!-- Big yen symbol watermark -->
  <text x="860" y="480" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="380" fill="#00A991" opacity="0.07" font-weight="700">¥</text>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="16" fill="#00A991"/>
  <text x="112" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#FFFFFF" font-weight="700" text-anchor="middle">¥</text>

  <!-- Site name -->
  <text x="162" y="128" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" fill="#FFFFFF" font-weight="700" dominant-baseline="middle">YenGoFar</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" fill="#FFFFFF" font-weight="700">Where does your</text>
  <text x="80" y="365" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" fill="#00A991" font-weight="700">yen go furthest?</text>

  <!-- Divider -->
  <rect x="80" y="405" width="120" height="4" fill="#00A991" rx="2"/>

  <!-- Subtext -->
  <text x="80" y="460" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="#8A9AB4">Compare purchasing power across 150+ destinations</text>
  <text x="80" y="500" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" fill="#8A9AB4">with live JPY exchange rates.</text>

  <!-- Bottom stats pills -->
  <rect x="80" y="548" width="180" height="44" rx="22" fill="#00A991" opacity="0.15"/>
  <text x="170" y="576" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#00A991" font-weight="600" text-anchor="middle">150+ cities</text>

  <rect x="274" y="548" width="160" height="44" rx="22" fill="#00A991" opacity="0.15"/>
  <text x="354" y="576" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#00A991" font-weight="600" text-anchor="middle">Live rates</text>

  <rect x="448" y="548" width="100" height="44" rx="22" fill="#00A991" opacity="0.15"/>
  <text x="498" y="576" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#00A991" font-weight="600" text-anchor="middle">Free</text>

  <!-- Domain -->
  <text x="1120" y="576" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#5C6E8A" text-anchor="end">yengofar.com</text>
</svg>
